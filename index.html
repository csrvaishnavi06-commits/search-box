<!DOCTYPE html>
<html>
<head>
  <title>Search Box</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .search-container {
      text-align: center;
    }

    input[type="text"] {
      padding: 12px;
      width: 300px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      background-color: #24292e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <h2>Search Here</h2>
    
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="text" name="search_query" placeholder="Type something..." required>
      <button type="submit">Search</button>
    </form>

  </div>

</body>
</html>
